services:
  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=6743
      - POSTGRES_DB=flexistock
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build: ./api-gateway
    ports:
      - "5001:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgresql://postgres:6743@db:5432/flexistock?schema=public
      - INVENTORY_SERVICE_URL=http://inventory-service:8080
      - ORDER_SERVICE_URL=http://order-service:8080
      - TRACK_SERVICE_URL=http://track-service:8080
      - FORECAST_SERVICE_URL=http://forecast_service:8080
      - SEARCH_SERVICE_URL=http://search-service:8080
    depends_on:
      db:
        condition: service_healthy

  inventory-service:
    build: ./inventory-service
    environment:
      - PORT=8080
      - DATABASE_URL=postgresql://postgres:6743@db:5432/flexistock?schema=public
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  order-service:
    build: ./order-service
    environment:
      - PORT=8080
      - DATABASE_URL=postgresql://postgres:6743@db:5432/flexistock?schema=public
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - FORECAST_API_URL=http://forecast-python:8000/forecast
      - INVENTORY_SERVICE_URL=http://inventory-service:8080
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  track-service:
    build: ./track-service
    environment:
      - PORT=8080
      - DATABASE_URL=postgresql://postgres:6743@db:5432/flexistock?schema=public
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  forecast_service:
    build: ./forecast_service
    environment:
      - PORT=8080
      - DATABASE_URL=postgresql://postgres:6743@db:5432/flexistock?schema=public
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-service:
    build: ./notification-service
    environment:
      - PORT=8080
      - DATABASE_URL=postgresql://postgres:6743@db:5432/flexistock?schema=public
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  search-service:
    build: ./search-service
    environment:
      - PORT=8080
      - DATABASE_URL=postgresql://postgres:6743@db:5432/flexistock?schema=public
    depends_on:
      db:
        condition: service_healthy

  forecast-python:
    build: ./forecast_service/pyservice
    ports:
      - "8000:8000"
    depends_on:
      - rabbitmq
